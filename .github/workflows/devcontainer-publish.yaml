name: Publish devcontainer image

on:
  workflow_dispatch:
  push:
    branches:
      - kubeconeu-2026-contribfest
    paths:
      - tools/build-tools/**
      - .devcontainer/devcontainer.json
      - .github/workflows/devcontainer-publish.yaml
      - go.mod

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: devcontainer

jobs:
  publish:
    name: publish-devcontainer
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push devcontainer image
        uses: devcontainers/ci@8bf61b26e9c3a98f69cb6ce2f88d24ff59b785c6 # v0.3.1900000417
        with:
          imageName: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          imageTag: kubeconeu-2026
          push: always

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod

      - name: Build and push test images
        env:
          VERSION: v1.0.0-ci1
        run: |
          make kgateway-docker sds-docker envoy-wrapper-docker dummy-idp-docker extproc-server-docker
          docker push ${{ env.IMAGE_REGISTRY }}/kgateway:${VERSION}
          docker push ${{ env.IMAGE_REGISTRY }}/sds:${VERSION}
          docker push ${{ env.IMAGE_REGISTRY }}/envoy-wrapper:${VERSION}
          docker push ${{ env.IMAGE_REGISTRY }}/dummy-idp:0.0.1
          docker push ${{ env.IMAGE_REGISTRY }}/extproc-server:0.0.1
