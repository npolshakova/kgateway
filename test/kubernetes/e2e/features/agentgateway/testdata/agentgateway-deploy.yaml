kind: GatewayParameters
apiVersion: gateway.kgateway.dev/v1alpha1
metadata:
  name: kgateway
spec:
  kube:
    agentGateway:
      enabled: true
      logLevel: trace
      customConfigMapName: agent-gateway-config
#      image:
#        tag: b1b9c00
---
kind: GatewayClass
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: agentgateway
spec:
  controllerName: kgateway.dev/kgateway
  parametersRef:
    group: gateway.kgateway.dev
    kind: GatewayParameters
    name: kgateway
    namespace: default
---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: agent-gateway
spec:
  gatewayClassName: agentgateway
  listeners:
    - protocol: HTTP
      port: 8080
      name: http
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin
  labels:
    example: httpbin-route
spec:
  parentRefs:
    - name: agent-gateway
      namespace: default
  hostnames:
    - "www.example.com"
  rules:
    - backendRefs:
        - name: httpbin
          port: 8000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-gateway-config
  namespace: default
data:
  config.json: |
    {
      "policies": [
        {
          "name": "default/transformation-policy",
          "target": {
            "gateway": "agent-gateway"
          },
          "spec": {
            "transformations": {
              "request": {
                "add": {
                  "x-transformed": "true"
                },
                "set": {
                  "content-type": "application/json"
                },
                "remove": ["x-unwanted"],
                "body": "request.body | .metadata.timestamp = now"
              },
              "response": {
                "add": {
                  "x-processed": "true"
                },
                "set": {
                  "cache-control": "max-age=3600"
                },
                "remove": ["x-internal"],
                "body": "response.body | .processed_at = now"
              }
            }
          }
        }
      ]
    }