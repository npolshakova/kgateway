
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: svc-route-1
spec:
  parentRefs:
    - name: gw
      namespace: default
  hostnames:
    - "example.com"
  rules:
    - matches:
      - headers:
        - name: X-Magic-Word
          value: please
      backendRefs:
      - name: httpbin
        port: 8000
---
